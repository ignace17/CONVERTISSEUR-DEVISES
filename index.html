<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Convertisseur de Devises - Ignace17</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Convertisseur</h1>
        <div class="converter-box">
            <input type="number" id="amount" value="1">
            <div class="selectors">
                <select id="fromCurrency"></select>
                <span> ➡️ </span>
                <select id="toCurrency"></select>
            </div>
            <button id="convertBtn">Convertir</button>
            <div id="resultBox">
                <p id="exchangeRate">Résultat...</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
